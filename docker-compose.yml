version: '3.8'

services:
  wireguard-config-merger:
    build: .
    container_name: wireguard-config-merger
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CONF_DIR=/app/conf
      - CONFIG_FILE=/app/data/config.json
    volumes:
      - ./conf:/app/conf:ro
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

