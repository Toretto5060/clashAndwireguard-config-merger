<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - WireGuard 配置管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .lock-info {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .lock-info strong {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .attempts-info {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 15px;
        }

        .attempts-info.warning {
            color: #dc3545;
            font-weight: 600;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.5s;
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 登录</h1>
            <p>WireGuard 配置管理中心</p>
        </div>

        <div id="alert" class="alert"></div>
        <div id="lockInfo" class="lock-info" style="display: none;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary" id="loginBtn">登录</button>

            <div id="attemptsInfo" class="attempts-info"></div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const alert = document.getElementById('alert');
        const lockInfo = document.getElementById('lockInfo');
        const attemptsInfo = document.getElementById('attemptsInfo');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        // 检查是否已登录
        if (sessionStorage.getItem('authToken')) {
            window.location.href = '/';
        }

        // 页面加载时检查IP锁定状态
        async function checkLockStatus() {
            try {
                const response = await fetch('/api/auth/status');
                const data = await response.json();

                if (data.locked) {
                    showLockInfo(data.remainingTime);
                    disableLogin();
                } else if (data.attempts > 0) {
                    showAttemptsWarning(data.attempts);
                }
            } catch (error) {
                console.error('检查锁定状态失败:', error);
            }
        }

        function showLockInfo(remainingTime) {
            lockInfo.innerHTML = `
                <strong>⚠️ 账号已被锁定</strong>
                由于多次登录失败，您的IP地址已被锁定。<br>
                剩余锁定时间: <strong>${remainingTime}</strong>
            `;
            lockInfo.style.display = 'block';
        }

        function showAttemptsWarning(attempts) {
            const remaining = 10 - attempts;
            attemptsInfo.textContent = `剩余尝试次数: ${remaining}/10`;
            if (remaining <= 3) {
                attemptsInfo.classList.add('warning');
            }
        }

        function disableLogin() {
            loginBtn.disabled = true;
            loginBtn.textContent = 'IP已被锁定';
            usernameInput.disabled = true;
            passwordInput.disabled = true;
        }

        function showAlert(message, type = 'error') {
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            
            loginForm.classList.add('shake');
            setTimeout(() => {
                loginForm.classList.remove('shake');
            }, 500);

            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                showAlert('请输入用户名和密码', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // 登录成功
                    sessionStorage.setItem('authToken', data.token);
                    showAlert('登录成功，正在跳转...', 'info');
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                } else {
                    // 登录失败
                    if (data.locked) {
                        showAlert(`登录失败次数过多，IP已被锁定 ${data.remainingTime}`, 'error');
                        showLockInfo(data.remainingTime);
                        disableLogin();
                    } else {
                        const remaining = 10 - (data.attempts || 0);
                        showAlert(`${data.error || '用户名或密码错误'} (剩余 ${remaining} 次尝试)`, 'error');
                        showAttemptsWarning(data.attempts || 0);
                    }
                    
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                showAlert('登录请求失败，请稍后重试', 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });

        // 页面加载时检查状态
        checkLockStatus();
    </script>
</body>
</html>
