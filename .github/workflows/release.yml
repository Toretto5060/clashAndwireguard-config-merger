name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          configurationJson: |
            {
              "template": "# 🚀 Release ${{tag}}\n\n## ✨ 更新内容\n\n${{CHANGELOG}}\n\n## 🐳 Docker image (GHCR)\n\n- `${{IMAGE}}:${{tag}}`\n- `${{IMAGE}}:latest`\n- Digest: `${{DIGEST}}`\n",
              "categories": [
                { "title": "🚀 Features", "labels": ["feature"] },
                { "title": "🐛 Bug Fixes", "labels": ["bug"] },
                { "title": "🧹 Chore", "labels": ["chore"] },
                { "title": "📚 Docs", "labels": ["docs"] }
              ],
              "ignore_labels": ["skip-changelog"]
            }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY,,}"
          echo "name=ghcr.io/${repo}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.tag.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
