name: Auto Tag, Release and Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version like v1.2.3"
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release version
        id: ver
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${{ inputs.version || '' }}" ]]; then
            v="${{ inputs.version }}"
            if [[ ! "$v" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version: $v"
              exit 1
            fi
            echo "version=$v" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          last="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"
          if [[ -z "$last" ]]; then
            next="v0.1.0"
          else
            raw="${last#v}"
            IFS='.' read -r major minor patch <<< "$raw"
            patch=$((patch + 1))
            next="v${major}.${minor}.${patch}"
          fi

          echo "version=$next" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists locally: $VERSION"
            exit 0
          fi
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY,,}"
          echo "name=ghcr.io/${repo}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.ver.outputs.version }}
            ${{ steps.image.outputs.name }}:latest

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          IMAGE: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "## Docker image

- \`$IMAGE:$VERSION\`
- \`$IMAGE:latest\`
- Digest: \`$DIGEST\`
"
